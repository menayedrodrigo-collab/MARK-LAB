<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MARK Lab Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg0:#02040A;--bg1:#04060C;--bg2:#070A14;--bg3:#0B0F1C;--bg4:#101525;
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.11);--line3:rgba(255,255,255,.18);
  --txt:#D6E4F0;--txt2:#7A94A8;--txt3:#3E5060;--txt4:#1E2C38;
  --acc:#00B4D8;--acc2:#0077B6;--acc3:#023E8A;--acc-glow:rgba(0,180,216,.25);
  --ok:#3AB882;--ok-bg:rgba(58,184,130,.12);--ok-bd:rgba(58,184,130,.3);
  --warn:#EF9F27;--warn-bg:rgba(239,159,39,.12);--warn-bd:rgba(239,159,39,.3);
  --bad:#E24B4A;--bad-bg:rgba(226,75,74,.12);--bad-bd:rgba(226,75,74,.3);
  --izq:#D4537E;--der:#378ADD;
  --r:6px;--rlg:10px;--shadow:0 2px 20px rgba(0,0,0,.5);
  --font-display:'Rajdhani',sans-serif;--font-body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg0);color:var(--txt);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh;font-size:13px}
.app-hdr{background:var(--bg1);border-bottom:1px solid var(--line2);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.6)}
.logo-container{display:flex;align-items:center;gap:10px}
.logo-img{height:32px; width:auto; border-radius: 4px;}
.logo-name{font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--acc);text-shadow:0 0 20px var(--acc-glow)}
.logo-pro{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--bg1);background:var(--acc);padding:2px 6px;border-radius:3px;margin-left:2px}
/* ... Resto de tus estilos originales ... */
/* (Mantenemos todo igual para no romper el diseño) */
.hdr-right{display:flex;gap:8px;align-items:center}
.ath-chip{background:var(--bg3);border:1px solid var(--line2);border-radius:var(--r);padding:4px 10px;font-size:11px;color:var(--txt2);display:flex;align-items:center;gap:5px}
.tab{padding:10px 14px;font-size:11px;cursor:pointer;border:none;background:none;color:var(--txt3);border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:.02em;font-family:var(--font-body);transition:color .15s}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:500}
.main{padding:18px 22px;max-width:1140px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rlg);padding:14px;box-shadow:var(--shadow)}
.card-ttl{font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--txt2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.acc-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc-glow);flex-shrink:0}
select,input[type=number],input[type=text],textarea{width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--line2);border-radius:var(--r);background:var(--bg3);color:var(--txt);font-family:var(--font-body)}
.btn-acc{background:var(--acc);color:var(--bg0);border:none;border-radius:var(--r);padding:7px 14px;font-size:11px;font-weight:600;cursor:pointer}
.btn-ghost{background:none;border:1px solid var(--line2);border-radius:var(--r);padding:7px 12px;font-size:11px;cursor:pointer;color:var(--txt)}
.mod-nav{background:var(--bg1);border-bottom:1px solid var(--line2);display:flex;align-items:stretch;padding:0;position:sticky;top:52px;z-index:150}
.mod-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:11px 24px;border:none;background:none;cursor:pointer;color:var(--txt3);border-bottom:3px solid transparent}
.mod-btn.on{color:var(--acc);border-bottom-color:var(--acc);background:rgba(0,180,216,.04)}
.sub-nav{background:var(--bg2);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:3px;overflow-x:auto;min-height:36px}
.sub-tab{padding:6px 13px;font-size:11px;cursor:pointer;border:none;background:none;color:var(--txt3);border-radius:4px}
.sub-tab.on{color:var(--acc);background:rgba(0,180,216,.1);font-weight:500}
.module{display:none}.module.on{display:block}
.stat{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);padding:10px;text-align:center}
.stat-val{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1;color:var(--txt)}
.score-ring{position:relative;width:120px;height:120px}
.score-ring-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-ring-num{font-family:var(--font-display);font-size:30px;font-weight:700}
.dim-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.dim-fill{height:100%;border-radius:4px;transition:width .5s}
.db-bar{background:var(--bg1);border-bottom:1px solid var(--line);padding:7px 22px;display:flex;align-items:center;gap:8px}
.dz{border:2px dashed var(--line2);border-radius:var(--rlg);padding:28px 18px;text-align:center;cursor:pointer}
</style>
</head>

<body>

<header class="app-hdr">
  <div class="logo-container">
    <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
    <span class="logo-name">MARK Lab</span>
    <span class="logo-pro">PRO</span>
  </div>
  <div class="hdr-right">
    <div class="ath-chip"><strong>Status:</strong> <span id="cloud-status" style="color:var(--ok)">Conectado</span></div>
    <div class="ath-chip"><strong id="hdr-name">Sin atleta</strong></div>
    <button class="btn-ghost" onclick="saveSession()">Guardar en Nube</button>
    <button class="btn-acc" onclick="expHTML()">Reporte</button>
  </div>
</header>

<div class="db-bar">
  <select id="db-ath-sel" onchange="loadAthlete(this.value)" style="min-width:160px"></select>
  <input type="text" id="db-new-name" placeholder="Nuevo atleta..." style="width:140px">
  <button class="btn-ghost" onclick="createAthlete()">+ Crear</button>
</div>

<nav class="mod-nav">
  <button class="mod-btn on" onclick="showModule('home',this)"><span>🏠</span><span>Home</span></button>
  <button class="mod-btn" onclick="showModule('test',this)"><span>⚡</span><span>Test Center</span></button>
  <button class="mod-btn" onclick="showModule('analytics',this)"><span>📊</span><span>Analytics</span></button>
  <button class="mod-btn" onclick="showModule('medical',this)"><span>🏥</span><span>Medical</span></button>
</nav>

<div id="mod-home" class="module on">
  <div class="main">
    <div class="card mb14">
        <div class="card-ttl"><div class="acc-dot"></div>Dashboard Nube</div>
        <div id="dash-strip" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;"></div>
    </div>
    <div class="card">
        <div class="card-ttl"><div class="acc-dot"></div>Perfil</div>
        <input type="text" id="a-name" placeholder="Nombre" oninput="upS()">
        <input type="number" id="a-weight" placeholder="Peso" oninput="upS()">
    </div>
  </div>
</div>

<script>
// CONFIGURACIÓN SUPABASE (Tus credenciales)
const supabaseUrl = 'https://uqwwtjgtollpvvfjkdce.supabase.co';
const supabaseKey = 'sb_publishable_MopSmAQRfFFezL3o1RpiYQ_Nqw_nBur';
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

var S = {name:'', sport:'soccer', sex:'M', weight:75, test:'CMJ', v:{CMJ:{}, SJ:{}, IMTP:{}, DJ:{}}};

// --- NUEVAS FUNCIONES DE NUBE ---

async function saveSession() {
    const athId = document.getElementById('db-ath-sel').value;
    if(!athId) return alert('Selecciona un atleta primero.');

    const statusEl = document.getElementById('cloud-status');
    statusEl.textContent = 'Guardando...';

    // Preparamos el objeto completo para guardar
    const payload = {
        atleta_id: athId,
        nombre: S.name,
        datos_json: {
            config: S,
            timestamp: new Date().toISOString()
        }
    };

    const { data, error } = await supabase
        .from('atletas')
        .insert([payload]);

    if (error) {
        console.error(error);
        statusEl.textContent = 'Error';
        alert('Error al guardar en Supabase');
    } else {
        statusEl.textContent = 'Sincronizado';
        alert('¡Datos guardados en la nube con éxito!');
        loadCloudAthletes(); // Refrescar lista
    }
}

async function loadCloudAthletes() {
    const { data, error } = await supabase
        .from('atletas')
        .select('*');

    if (error) return console.error(error);

    const sel = document.getElementById('db-ath-sel');
    sel.innerHTML = '<option value="">-- Seleccionar --</option>' + 
        data.map(a => `<option value="${a.id}">${a.nombre}</option>`).join('');
}

async function createAthlete() {
    const name = document.getElementById('db-new-name').value.trim();
    if(!name) return;
    
    const { data, error } = await supabase
        .from('atletas')
        .insert([{ nombre: name, datos_json: { creado: new Date() } }]);

    if(!error) {
        document.getElementById('db-new-name').value = '';
        loadCloudAthletes();
    }
}

// Inicialización
window.onload = () => {
    loadCloudAthletes();
};

// --- TUS FUNCIONES ORIGINALES DE UI (Mantenidas) ---
function showModule(id, btn) {
    document.querySelectorAll('.module').forEach(m => m.classList.remove('on'));
    document.getElementById('mod-'+id).classList.add('on');
    document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
}

function upS() {
    S.name = document.getElementById('a-name').value;
    S.weight = document.getElementById('a-weight').value;
    document.getElementById('hdr-name').textContent = S.name || 'Sin atleta';
}

// ... El resto de tus funciones de cálculo, gráficos etc ...
</script>
</body>
</html>
